<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Knack</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #ecf0f3;
            --text-main: #44476a;
            --text-light: #8993b0;
            --primary: #6c5ce7; 
            --accent: #00b894;
            --danger: #ff7675;
            
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Ambient Background --- */
        .blob-cont {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 { background: #ff7675; width: 300px; height: 300px; top: -50px; left: -100px; }
        .blob-2 { background: #74b9ff; width: 250px; height: 250px; bottom: 50px; right: -50px; animation-delay: 2s; }
        .blob-3 { background: #a29bfe; width: 200px; height: 200px; top: 40%; left: 40%; animation-delay: 4s; opacity: 0.4; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20px, 40px) scale(1.1); }
        }

        /* --- Layout --- */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 30px 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Welcome Splash Overlay --- */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(236, 240, 243, 0.95);
            backdrop-filter: blur(15px);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .welcome-content h1 { font-size: 2.5rem; color: var(--primary); margin: 0; }
        .welcome-content p { font-size: 1.2rem; color: var(--text-main); font-weight: 700; margin-top: 10px;}

        /* --- Edit Modal Overlay --- */
        #edit-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 52, 54, 0.4);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Components --- */
        .neu-card {
            border-radius: 30px;
            background: rgba(236, 240, 243, 0.6);
            backdrop-filter: blur(10px);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
        }

        .neu-input {
            width: 100%;
            border: none;
            background: var(--bg);
            border-radius: 15px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            padding: 18px;
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            outline: none;
            transition: box-shadow 0.2s;
        }
        .neu-input:focus {
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light), 0 0 5px rgba(108, 92, 231, 0.2);
        }

        .neu-btn {
            border: none;
            background: var(--bg);
            border-radius: 15px;
            box-shadow: 6px 6px 10px var(--shadow-dark), -6px -6px 10px var(--shadow-light);
            color: var(--primary);
            font-weight: 900;
            padding: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            width: 100%;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .neu-btn:active, .neu-btn.active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            transform: translateY(2px);
            color: var(--accent);
        }
        
        .neu-btn.danger { color: var(--danger); }

        /* File Upload */
        .file-upload-wrapper { position: relative; margin-bottom: 20px; }
        .file-upload-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; border-radius: 20px; background: var(--bg);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            color: var(--text-light); font-weight: 700; cursor: pointer;
        }
        .file-upload-label i { font-size: 2rem; margin-bottom: 10px; }
        input[type="file"] { display: none; }

        /* Navbar */
        .nav-pill {
            display: flex; background: var(--bg); padding: 5px; border-radius: 20px;
            box-shadow: 6px 6px 10px var(--shadow-dark), -6px -6px 10px var(--shadow-light);
            margin-bottom: 30px;
        }
        .nav-item {
            flex: 1; text-align: center; padding: 12px; border-radius: 15px;
            font-weight: 800; color: var(--text-light); cursor: pointer; border: none; background: transparent;
        }
        .nav-item.active {
            background: var(--bg); color: var(--primary);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        /* List Items & Menus */
        .item-card {
            display: flex; align-items: center; background: var(--bg);
            border-radius: 20px; padding: 15px; margin-bottom: 20px;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            position: relative;
        }
        .item-img-box {
            width: 70px; height: 70px; border-radius: 15px; margin-right: 20px; flex-shrink: 0;
            background: var(--bg); box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .item-img { width: 100%; height: 100%; object-fit: cover; }
        .item-icon { font-size: 30px; opacity: 0.3; }
        .item-info { flex-grow: 1; }
        .item-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: var(--text-main); }
        .tag-loc {
            display: inline-block; font-size: 0.75rem; background: var(--bg);
            padding: 4px 10px; border-radius: 10px; color: var(--primary); font-weight: 800;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
        }
        
        /* Item Menu Button */
        .menu-btn {
            border: none; background: transparent; color: var(--text-light);
            font-size: 1.2rem; cursor: pointer; padding: 10px;
        }
        .item-menu-dropdown {
            position: absolute; right: 15px; top: 50px;
            background: var(--bg); border-radius: 15px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.1), -5px -5px 10px var(--shadow-light);
            overflow: hidden; z-index: 100; min-width: 120px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .menu-option {
            padding: 12px 20px; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s;
        }
        .menu-option:hover { background: rgba(0,0,0,0.05); }
        .menu-option.delete { color: var(--danger); }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 700;
            padding-bottom: 10px;
        }

        .hidden { display: none !important; }
        .logout-text { color: var(--danger); font-size: 0.8rem; font-weight: 700; margin-top: 30px; display: block; text-align: center; cursor: pointer; }

    </style>
</head>
<body>

    <div class="blob-cont">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div id="welcome-overlay" class="hidden">
        <div class="welcome-content">
            <h1>Knack</h1>
            <p id="welcome-msg">Hello...</p>
        </div>
    </div>

    <div id="edit-modal" class="hidden">
        <div class="neu-card" style="width: 90%; max-width: 350px; margin: 0;">
            <h2 style="text-align: center;">Edit Item</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" class="neu-input" placeholder="Name">
            <input type="text" id="edit-loc" class="neu-input" placeholder="Location">
            <div style="display: flex; gap: 10px;">
                <button onclick="closeEdit()" class="neu-btn" style="color: var(--text-light);">Cancel</button>
                <button onclick="saveEdit()" class="neu-btn">Save</button>
            </div>
        </div>
    </div>

    <div class="container">
        
        <div id="auth-screen" class="neu-card" style="text-align: center; padding-top: 50px; padding-bottom: 50px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <div style="font-size: 60px; margin-bottom: 20px;">⚡</div>
                <h1 style="margin:0;">Knack</h1>
                <p style="margin-bottom: 40px; margin-top:5px;">Organize your life.</p>
                <button id="login-btn" class="neu-btn">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </div>
            <div class="footer">
                &lt;/&gt; with 💭 by Spandan.
            </div>
        </div>

        <div id="app-screen" class="hidden" style="flex-grow: 1;">
            
            <div class="nav-pill">
                <button onclick="showView('add')" id="nav-add" class="nav-item active">
                    <i class="fas fa-plus"></i> Add
                </button>
                <button onclick="showView('list')" id="nav-list" class="nav-item">
                    <i class="fas fa-search"></i> Find
                </button>
            </div>

            <div id="view-add">
                <div class="neu-card">
                    <h2>Stash Item</h2>
                    <input type="text" id="inp-name" class="neu-input" placeholder="Name">
                    <input type="text" id="inp-loc" class="neu-input" placeholder="Location / Shelf">
                    <textarea id="inp-desc" class="neu-input" placeholder="Description" rows="3"></textarea>
                    
                    <div class="file-upload-wrapper">
                        <label for="inp-file" class="file-upload-label" id="file-label">
                            <i class="fas fa-camera"></i>
                            <span>Add Photo</span>
                        </label>
                        <input type="file" id="inp-file" accept="image/*">
                    </div>
                    
                    <button id="save-btn" class="neu-btn">
                        <i class="fas fa-check"></i> Save
                    </button>
                </div>
            </div>

            <div id="view-list" class="hidden">
                <div style="margin-bottom: 25px;">
                    <input type="text" id="search-bar" class="neu-input" placeholder="🔍 Search...">
                </div>
                <div id="inventory-list"></div>
            </div>
            
            <div id="logout-btn" class="logout-text">Sign Out</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // Added doc, deleteDoc, updateDoc to imports
        import { getFirestore, collection, addDoc, doc, deleteDoc, updateDoc, query, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWz3mkFz_sGAPIYynKglBJz3ub9113v9A",
            authDomain: "knack-2ffba.firebaseapp.com",
            projectId: "knack-2ffba",
            storageBucket: "knack-2ffba.firebasestorage.app",
            messagingSenderId: "683820138416",
            appId: "1:683820138416:web:f051ad81092ca1730ee075",
            measurementId: "G-BE7TKVTYPS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let inventoryUnsub = null;
        let allItems = []; // Store items globally for easier access

        // UI Refs
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const welcomeOverlay = document.getElementById('welcome-overlay');
        const welcomeMsg = document.getElementById('welcome-msg');
        
        const greetings = ["Welcome back,", "Good to see you,", "Ready to organize,", "Hi there,", "Let's get sorted,", "Hello,"];

        // Auth
        loginBtn.addEventListener('click', () => signInWithPopup(auth, provider));
        logoutBtn.addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                const firstName = user.displayName ? user.displayName.split(' ')[0] : 'Friend';
                const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
                welcomeMsg.innerHTML = `${randomGreeting}<br><span style="color:var(--text-main); font-weight:900; font-size:1.5rem;">${firstName}</span>`;
                
                authScreen.classList.add('hidden');
                welcomeOverlay.classList.remove('hidden');
                
                loadInventory();

                setTimeout(() => {
                    welcomeOverlay.style.opacity = '0'; 
                    setTimeout(() => {
                        welcomeOverlay.classList.add('hidden');
                        welcomeOverlay.style.opacity = '1';
                        appScreen.classList.remove('hidden');
                    }, 500); 
                }, 2000);

            } else {
                currentUser = null;
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
                welcomeOverlay.classList.add('hidden');
                if(inventoryUnsub) inventoryUnsub();
            }
        });

        // Add Item
        const saveBtn = document.getElementById('save-btn');
        const fileInput = document.getElementById('inp-file');
        const fileLabel = document.getElementById('file-label');

        fileInput.addEventListener('change', () => {
            if(fileInput.files.length > 0) {
                fileLabel.innerHTML = `<i class="fas fa-check-circle" style="color:var(--accent)"></i><span>Image Selected</span>`;
            }
        });

        saveBtn.addEventListener('click', async () => {
            const name = document.getElementById('inp-name').value;
            const loc = document.getElementById('inp-loc').value;
            const desc = document.getElementById('inp-desc').value;
            
            if (!name || !loc) return alert("Name and Location required");
            
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = "Saving...";
            
            let imageBase64 = null;
            if (fileInput.files[0]) {
                try { imageBase64 = await toBase64(fileInput.files[0]); } catch(e){}
            }

            try {
                await addDoc(collection(db, "users", currentUser.uid, "items"), {
                    name: name,
                    name_lower: name.toLowerCase(),
                    location: loc,
                    description: desc,
                    image: imageBase64,
                    createdAt: serverTimestamp()
                });
                
                // Reset
                document.getElementById('inp-name').value = '';
                document.getElementById('inp-loc').value = '';
                document.getElementById('inp-desc').value = '';
                fileInput.value = '';
                fileLabel.innerHTML = `<i class="fas fa-camera"></i><span>Add Photo</span>`;
                
            } catch (e) {
                alert("Error: " + e.message);
            }
            saveBtn.innerHTML = originalText;
        });

        // List
        const listContainer = document.getElementById('inventory-list');
        const searchBar = document.getElementById('search-bar');

        function loadInventory() {
            const q = query(collection(db, "users", currentUser.uid, "items"), orderBy("createdAt", "desc"));
            inventoryUnsub = onSnapshot(q, (snapshot) => {
                allItems = [];
                snapshot.forEach(doc => allItems.push({id: doc.id, ...doc.data()}));
                renderList(allItems);
            });
        }

        function renderList(items) {
            listContainer.innerHTML = '';
            if (items.length === 0) {
                listContainer.innerHTML = `
                    <div style="text-align:center; margin-top:50px; opacity:0.6">
                        <i class="fas fa-ghost" style="font-size:40px; margin-bottom:10px;"></i>
                        <p>No items found.</p>
                    </div>`;
                return;
            }

            items.forEach(item => {
                const imgHTML = item.image 
                    ? `<img src="${item.image}" class="item-img">` 
                    : `<i class="fas fa-box item-icon"></i>`;

                const html = `
                <div class="item-card">
                    <div class="item-img-box">${imgHTML}</div>
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <div class="tag-loc"><i class="fas fa-map-marker-alt"></i> ${item.location}</div>
                        <p class="item-desc">${item.description || ''}</p>
                    </div>
                    <button class="menu-btn" onclick="window.toggleMenu('${item.id}')">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                    <div id="menu-${item.id}" class="item-menu-dropdown hidden">
                        <div class="menu-option" onclick="window.prepEdit('${item.id}')">Edit</div>
                        <div class="menu-option delete" onclick="window.deleteItem('${item.id}')">Delete</div>
                    </div>
                </div>`;
                listContainer.innerHTML += html;
            });
        }

        searchBar.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allItems.filter(item => 
                item.name_lower.includes(term) || item.location.toLowerCase().includes(term)
            );
            renderList(filtered);
        });

        // --- GLOBAL FUNCTIONS FOR ACTIONS ---
        
        // 1. Toggle Menu
        window.toggleMenu = (id) => {
            // Close all other menus first
            document.querySelectorAll('.item-menu-dropdown').forEach(el => {
                if (el.id !== `menu-${id}`) el.classList.add('hidden');
            });
            const menu = document.getElementById(`menu-${id}`);
            menu.classList.toggle('hidden');
        };

        // 2. Delete Item
        window.deleteItem = async (id) => {
            if(!confirm("Are you sure you want to delete this item?")) return;
            try {
                await deleteDoc(doc(db, "users", currentUser.uid, "items", id));
            } catch(e) {
                alert("Error deleting: " + e.message);
            }
        };

        // 3. Edit Item (Open Modal)
        window.prepEdit = (id) => {
            const item = allItems.find(i => i.id === id);
            if (!item) return;
            
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = item.name;
            document.getElementById('edit-loc').value = item.location;
            
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById(`menu-${id}`).classList.add('hidden'); // Close menu
        };

        window.closeEdit = () => {
            document.getElementById('edit-modal').classList.add('hidden');
        };

        // 4. Save Edit
        window.saveEdit = async () => {
            const id = document.getElementById('edit-id').value;
            const newName = document.getElementById('edit-name').value;
            const newLoc = document.getElementById('edit-loc').value;

            if(!newName || !newLoc) return alert("Fields cannot be empty");

            try {
                await updateDoc(doc(db, "users", currentUser.uid, "items", id), {
                    name: newName,
                    name_lower: newName.toLowerCase(),
                    location: newLoc
                });
                window.closeEdit();
            } catch(e) {
                alert("Error updating: " + e.message);
            }
        };

        // Utilities
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        window.showView = (viewName) => {
            document.getElementById('view-add').classList.add('hidden');
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('nav-add').classList.remove('active');
            document.getElementById('nav-list').classList.remove('active');
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            document.getElementById(`nav-${viewName}`).classList.add('active');
            
            // Close any open menus when switching views
            document.querySelectorAll('.item-menu-dropdown').forEach(el => el.classList.add('hidden'));
        }
    </script>
</body>
</html>
